<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Pogodowy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 0.8vmin; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.03); border-radius: 2vmin; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); border-radius: 2vmin; }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-100 via-blue-50 to-amber-50 text-slate-800 min-h-screen h-screen w-screen overflow-hidden font-sans p-0 m-0">

    <div id="widget-container" class="w-full h-full p-[2vmin] flex flex-col justify-between relative">
        <div id="status-msg" class="absolute top-[50%] left-0 w-full text-center text-slate-400 z-50 text-[3vmin]">Ładowanie danych...</div>
        
        <!-- UI (pozostała struktura bez zmian) -->
        <div id="search-panel" class="hidden absolute inset-0 bg-white/95 backdrop-blur-md z-30 p-[4vmin] flex flex-col">
            <div class="flex items-center gap-[2vmin] mb-[3vmin]">
                <input id="city-input" type="text" placeholder="Wpisz miasto..." class="flex-1 bg-slate-100 rounded-[3vmin] py-[3vmin] pl-[4vmin] text-[4vmin] focus:outline-none border border-slate-200">
                <button id="close-search-btn" class="p-[3vmin] text-slate-600 font-bold">Zamknij</button>
            </div>
            <div id="search-results" class="flex-1 overflow-y-auto custom-scrollbar"></div>
        </div>

        <div class="z-10 flex items-center justify-between">
            <div>
                <span id="widget-city" class="text-[5.2vmin] font-extrabold truncate">Warszawa</span>
                <span id="widget-country" class="text-[3.1vmin] text-slate-500 block">Polska</span>
            </div>
            <button id="search-toggle-btn" class="p-[3vmin] bg-slate-800/10 rounded-full text-slate-900 shadow-sm">
                <i data-lucide="search" class="w-[6vmin] h-[6vmin]"></i>
            </button>
        </div>

        <div class="z-10 flex items-center justify-between">
            <div class="flex items-center gap-[3vmin]">
                <div class="w-[14vmin] h-[14vmin] rounded-[4vmin] bg-white/80 flex items-center justify-center border border-slate-200/50">
                    <i data-lucide="sun" class="w-[8vmin] h-[8vmin] text-orange-500"></i>
                </div>
                <div>
                    <span id="current-temp" class="text-[10vmin] font-black">--</span><span class="text-[6vmin] font-bold text-orange-500">°C</span>
                </div>
            </div>
            <div class="text-right text-[2.8vmin] text-slate-500">
                <div>Wiatr: <span id="wind-speed" class="font-bold text-slate-800">--</span></div>
                <div>Opad: <span id="precipitation" class="font-bold text-slate-800">--</span></div>
            </div>
        </div>

        <div class="z-10 bg-white/40 rounded-[4vmin] p-[2vmin] flex-[0.8] relative">
            <canvas id="hourlyChart"></canvas>
        </div>
    </div>

    <script>
        let currentLocation = JSON.parse(localStorage.getItem('weather_app_loc')) || { name: "Warszawa", country: "Polska", lat: 52.2298, lon: 21.0118 };
        let hourlyChart = null;

        async function fetchWeatherData() {
            const status = document.getElementById('status-msg');
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLocation.lat}&longitude=${currentLocation.lon}&current_weather=true&hourly=temperature_2m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`;
                
                // Wymuszenie trybu no-cache i cors dla Android WebView
                const res = await fetch(url, { mode: 'cors', cache: 'no-cache' });
                const weatherData = await res.json();
                
                status.style.display = 'none';
                document.getElementById('widget-city').innerText = currentLocation.name;
                document.getElementById('current-temp').innerText = Math.round(weatherData.current_weather.temperature);
                document.getElementById('wind-speed').innerText = weatherData.current_weather.windspeed + ' km/h';
                document.getElementById('precipitation').innerText = (weatherData.hourly.precipitation[0] || 0) + ' mm';
                
                renderChart(weatherData);
            } catch (e) {
                status.innerText = "Błąd połączenia. Sprawdź internet.";
                console.error(e);
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            if (hourlyChart) hourlyChart.destroy();
            
            hourlyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.hourly.time.slice(0, 12).map(t => t.split('T')[1].slice(0,5)),
                    datasets: [{ label: 'Temp', data: data.hourly.temperature_2m.slice(0, 12), borderColor: '#f97316', tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        document.getElementById('search-toggle-btn').onclick = () => document.getElementById('search-panel').classList.remove('hidden');
        document.getElementById('close-search-btn').onclick = () => document.getElementById('search-panel').classList.add('hidden');
        
        window.onload = () => { lucide.createIcons(); fetchWeatherData(); };
    </script>
</body>
</html>

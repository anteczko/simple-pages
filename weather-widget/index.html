<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Pogodowy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jQuery dla stabilnego działania AJAX -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 0.8vmin; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.03); border-radius: 2vmin; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); border-radius: 2vmin; }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-100 via-blue-50 to-amber-50 text-slate-800 min-h-screen h-screen w-screen overflow-hidden font-sans m-0 p-0">

    <!-- Kontener Edge-to-Edge: p-0 zapewnia wypełnienie całego ekranu -->
    <div id="widget-container" class="w-full h-full flex flex-col justify-between relative overflow-hidden">
        
        <!-- Panel Wyszukiwania -->
        <div id="search-panel" class="hidden absolute inset-0 bg-white/95 backdrop-blur-md z-30 p-[4vmin] flex flex-col">
            <div class="flex items-center gap-[2vmin] mb-[3vmin]">
                <div class="relative flex-1">
                    <input id="city-input" type="text" placeholder="Wpisz miasto..." class="w-full bg-slate-100 text-slate-800 rounded-[3vmin] py-[3vmin] pl-[4vmin] text-[4vmin] focus:outline-none border border-slate-200">
                </div>
                <button id="close-search-btn" class="p-[3vmin] text-slate-600 font-bold text-[3.5vmin]">Zamknij</button>
            </div>
            <div id="search-results" class="flex-1 overflow-y-auto custom-scrollbar space-y-[1vmin]"></div>
        </div>

        <!-- Nagłówek -->
        <div class="z-10 flex items-center justify-between p-[4vmin]">
            <div class="flex flex-col">
                <span id="widget-city" class="text-[5.2vmin] font-extrabold tracking-tight text-slate-800 truncate">Bydgoszcz</span>
                <span id="widget-country" class="text-[3.1vmin] font-medium text-slate-500 truncate">Polska</span>
            </div>
            <button id="search-toggle-btn" class="p-[3vmin] bg-slate-800/10 rounded-full text-slate-900 shadow-sm">
                <i data-lucide="search" class="w-[6vmin] h-[6vmin]"></i>
            </button>
        </div>

        <!-- Dane pogodowe -->
        <div class="z-10 flex items-center justify-between px-[4vmin] py-[2vmin]">
            <div class="flex items-center gap-[3vmin]">
                <div class="w-[14vmin] h-[14vmin] rounded-[4vmin] bg-white/80 flex items-center justify-center border border-slate-200/50">
                    <i data-lucide="sun" class="w-[8vmin] h-[8vmin] text-orange-500"></i>
                </div>
                <div>
                    <span id="current-temp" class="text-[10vmin] font-black leading-none">--</span><span class="text-[6vmin] font-bold text-orange-500">°C</span>
                </div>
            </div>
            <div class="text-right text-[2.8vmin] text-slate-500">
                <div>Wiatr: <span id="wind-speed" class="font-bold text-slate-800">--</span></div>
                <div>Opad: <span id="precipitation" class="font-bold text-slate-800">--</span></div>
            </div>
        </div>

        <!-- Przełącznik okresu -->
        <div class="z-10 flex bg-slate-200/50 p-[0.5vmin] rounded-[3vmin] mx-[4vmin] mb-[2vmin] text-[3vmin] font-bold text-slate-500 gap-[0.5vmin]">
            <button id="tab-today" class="flex-1 py-[1.5vmin] rounded-[2.5vmin] bg-white text-slate-800 shadow-sm">Dzisiaj</button>
            <button id="tab-tomorrow" class="flex-1 py-[1.5vmin] rounded-[2.5vmin]">Jutro</button>
            <button id="tab-week" class="flex-1 py-[1.5vmin] rounded-[2.5vmin]">Tydzień</button>
        </div>

        <!-- Wykres -->
        <div class="z-10 bg-white/40 flex-1 relative px-[4vmin] pb-[4vmin] pt-[2vmin]">
            <canvas id="hourlyChart"></canvas>
        </div>
    </div>

    <script>
        // Pomocnicze funkcje dla obsługi ciasteczek (Cookies)
        function setCookie(name, value, days) {
            try {
                let expires = "";
                if (days) {
                    let date = new Date();
                    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                    expires = "; expires=" + date.toUTCString();
                }
                document.cookie = name + "=" + (encodeURIComponent(JSON.stringify(value)) || "") + expires + "; path=/; SameSite=Lax";
            } catch (e) {
                console.warn("Zapis ciasteczek zablokowany:", e);
            }
        }

        function getCookie(name) {
            try {
                let nameEQ = name + "=";
                let ca = document.cookie.split(';');
                for (let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                    if (c.indexOf(nameEQ) === 0) {
                        return JSON.parse(decodeURIComponent(c.substring(nameEQ.length, c.length)));
                    }
                }
            } catch (e) {
                console.warn("Odczyt ciasteczek zablokowany:", e);
            }
            return null;
        }

        // Definicja domyślnego miasta jako Bydgoszcz
        const DEFAULT_LOCATION = { name: "Bydgoszcz", country: "Polska", lat: 53.1235, lon: 18.0084 };
        let currentLocation = DEFAULT_LOCATION;
        
        // Bezpieczny, kaskadowy odczyt lokalizacji (localStorage -> sessionStorage -> cookies -> default)
        function loadSavedLocation() {
            try {
                const saved = localStorage.getItem('weather_app_loc');
                if (saved) return JSON.parse(saved);
            } catch (e) {
                console.warn("Brak dostępu do localStorage.");
            }

            try {
                const saved = sessionStorage.getItem('weather_app_loc');
                if (saved) return JSON.parse(saved);
            } catch (e) {
                console.warn("Brak dostępu do sessionStorage.");
            }

            try {
                const saved = getCookie('weather_app_loc');
                if (saved) return saved;
            } catch (e) {
                console.warn("Brak dostępu do ciasteczek.");
            }

            return DEFAULT_LOCATION;
        }

        // Bezpieczny, kaskadowy zapis lokalizacji
        function saveLocation(loc) {
            currentLocation = loc;

            try {
                localStorage.setItem('weather_app_loc', JSON.stringify(loc));
            } catch (e) {}

            try {
                sessionStorage.setItem('weather_app_loc', JSON.stringify(loc));
            } catch (e) {}

            try {
                setCookie('weather_app_loc', loc, 365);
            } catch (e) {}
        }

        let currentMode = 'today';
        let weatherData = null;
        let hourlyChart = null;

        function fetchWeatherData() {
            // Unikalny timestamp zapobiegający agresywnemu cache'owaniu w WebView
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLocation.lat}&longitude=${currentLocation.lon}&current_weather=true&hourly=temperature_2m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&forecast_days=7&timezone=auto&_t=${new Date().getTime()}`;
            
            $.ajax({
                url: url,
                method: 'GET',
                dataType: 'json',
                cache: false,
                crossDomain: true,
                timeout: 10000,
                success: function(data) {
                    weatherData = data;
                    $('#widget-city').text(currentLocation.name);
                    $('#widget-country').text(currentLocation.country);
                    $('#current-temp').text(Math.round(data.current_weather.temperature));
                    $('#wind-speed').text(data.current_weather.windspeed + ' km/h');
                    $('#precipitation').text((data.hourly.precipitation[0] || 0) + ' mm');
                    renderChart();
                },
                error: function(xhr, status, err) { 
                    console.error("AJAX Error:", status, err);
                    $('#current-temp').text('Err');
                    $('#widget-country').text('Błąd API: ' + status);
                }
            });
        }

        // Dynamiczne wyszukiwanie z adresu URL (?city=Nazwa lub ?q=Nazwa)
        function fetchLocationFromUrlQuery(query) {
            $.ajax({
                url: `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&language=pl&count=1`,
                cache: false,
                crossDomain: true,
                success: function(data) {
                    if (data.results && data.results.length > 0) {
                        const city = data.results[0];
                        const newLoc = { 
                            name: city.name, 
                            country: city.country || "Polska", 
                            lat: city.latitude, 
                            lon: city.longitude 
                        };
                        saveLocation(newLoc); // Zapisz, aby zapamiętać tę zmianę lokalnie
                    } else {
                        console.warn(`Nie odnaleziono miasta z zapytania URL: "${query}". Ładowanie ostatniej lokalizacji.`);
                        currentLocation = loadSavedLocation();
                    }
                    fetchWeatherData();
                },
                error: function() {
                    console.error("Błąd podczas automatycznego wyszukiwania z parametru URL.");
                    currentLocation = loadSavedLocation();
                    fetchWeatherData();
                }
            });
        }

        function searchCity(query) {
            if(query.length < 2) return;
            $.ajax({
                url: `https://geocoding-api.open-meteo.com/v1/search?name=${query}&language=pl&count=5`,
                cache: false,
                crossDomain: true,
                success: function(data) {
                    const resultsDiv = $('#search-results').empty();
                    if(data.results) {
                        data.results.forEach(city => {
                            $('<button>').addClass('w-full text-left p-[4vmin] bg-white rounded-[2vmin] hover:bg-slate-100')
                                .html(`<div class="font-bold text-[3.5vmin]">${city.name}</div><div class="text-[3vmin] text-slate-500">${city.country}</div>`)
                                .on('click', () => {
                                    const newLoc = { name: city.name, country: city.country, lat: city.latitude, lon: city.longitude };
                                    saveLocation(newLoc);
                                    $('#search-panel').addClass('hidden');
                                    fetchWeatherData();
                                }).appendTo(resultsDiv);
                        });
                    }
                }
            });
        }

        // Własny plugin do przyciemniania przeszłości dla widoku "Dzisiaj"
        const pastShadingPlugin = {
            id: 'pastShading',
            beforeDraw: (chart) => {
                if (currentMode !== 'today' || !weatherData) return;
                const ctx = chart.ctx;
                const xAxis = chart.scales.x;
                const yAxis = chart.scales.y;
                if (!xAxis || !yAxis) return;

                const now = new Date();
                const currentHour = now.getHours();
                const pct = currentHour / 22; // 12 punktów pomiaru (od 0 do 22 z krokiem 2)
                const rightX = xAxis.left + (xAxis.width * Math.min(1, Math.max(0, pct)));

                ctx.save();
                ctx.fillStyle = 'rgba(15, 23, 42, 0.08)'; // Subtelne przyciemnienie przeszłości
                ctx.fillRect(xAxis.left, yAxis.top, rightX - xAxis.left, yAxis.bottom - yAxis.top);
                ctx.restore();
            }
        };

        function renderChart() {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            if (hourlyChart) hourlyChart.destroy();
            
            const labels = [], dataTemp = [], dataTempMin = [], dataRain = [];
            
            if (currentMode === 'week') {
                weatherData.daily.time.forEach((day, i) => {
                    labels.push(new Date(day).toLocaleDateString('pl', { weekday: 'short' }));
                    dataTemp.push(weatherData.daily.temperature_2m_max[i]);
                    dataTempMin.push(weatherData.daily.temperature_2m_min[i]);
                    dataRain.push(weatherData.daily.precipitation_sum[i]);
                });
            } else {
                const offset = currentMode === 'tomorrow' ? 24 : 0;
                for(let i=offset; i<offset+24; i+=2) {
                    labels.push(weatherData.hourly.time[i].split('T')[1].slice(0,5));
                    dataTemp.push(weatherData.hourly.temperature_2m[i]);
                    dataRain.push(weatherData.hourly.precipitation[i]);
                }
            }

            // Wykres deszczu ze zoptymalizowaną przeźroczystością
            const datasets = [
                { label: 'Deszcz', data: dataRain, type: 'bar', backgroundColor: 'rgba(14, 165, 233, 0.6)', yAxisID: 'y1', order: 2 },
                { label: 'Temp', data: dataTemp, type: 'line', borderColor: '#f97316', fill: false, tension: 0.4, order: 1 }
            ];

            // Druga linia dla temperatury minimalnej w widoku tygodniowym
            if(currentMode === 'week') {
                datasets.push({ label: 'Temp Min', data: dataTempMin, type: 'line', borderColor: '#3b82f6', fill: false, tension: 0.4, order: 1 });
            }

            hourlyChart = new Chart(ctx, {
                data: { labels, datasets },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: {
                        y: { position: 'left' },
                        y1: { position: 'right', grid: { drawOnChartArea: false } }
                    }
                },
                plugins: [pastShadingPlugin]
            });
        }

        const tabs = ['today', 'tomorrow', 'week'];
        tabs.forEach(tab => {
            $(`#tab-${tab}`).on('click', function() {
                currentMode = tab;
                tabs.forEach(t => {
                    $(`#tab-${t}`).toggleClass('bg-white text-slate-800 shadow-sm', t === currentMode);
                });
                renderChart();
            });
        });

        $('#search-toggle-btn').on('click', () => {
            $('#search-panel').removeClass('hidden');
            setTimeout(() => $('#city-input').trigger('focus'), 100);
        });

        $('#close-search-btn').on('click', () => $('#search-panel').addClass('hidden'));
        $('#city-input').on('input', (e) => searchCity(e.target.value));

        $(window).on('load', () => {
            lucide.createIcons();
            
            // Odczyt parametrów query z adresu URL (np. ?city=Poznan lub ?q=Poznan)
            const urlParams = new URLSearchParams(window.location.search);
            const cityQuery = urlParams.get('city') || urlParams.get('q');
            
            if (cityQuery) {
                fetchLocationFromUrlQuery(cityQuery.trim());
            } else {
                currentLocation = loadSavedLocation();
                fetchWeatherData();
            }
        });
    </script>
</body>
</html>

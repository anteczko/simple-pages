<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Pogodowy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        /* Stylizacja scrollbara dla listy wyszukiwania */
        .custom-scrollbar::-webkit-scrollbar {
            width: 0.8vmin;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 2vmin;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.12);
            border-radius: 2vmin;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-100 via-blue-50 to-amber-50 text-slate-800 min-h-screen h-screen flex items-center justify-center overflow-hidden font-sans selection:bg-orange-400 selection:text-white">

    <!-- Główny Kontener Widgetu (Zoptymalizowany pod kątem proporcji 1.06:1, skalujący się idealnie i bez rozmycia) -->
    <div id="widget-container" class="w-[90vmin] h-[85vmin] bg-white/70 backdrop-blur-xl border border-white/60 rounded-[8vmin] p-[4vmin] shadow-[0_4vmin_10vmin_rgba(15,23,42,0.08)] relative overflow-hidden flex flex-col justify-between transition-all duration-100 ease-out shrink-0">
        
        <!-- Warstwy dekoracyjne (Delikatne, jasne poświaty) -->
        <div class="absolute -top-[10vmin] -right-[10vmin] w-[32vmin] h-[32vmin] bg-orange-300/20 rounded-full blur-[8vmin] pointer-events-none"></div>
        <div class="absolute -bottom-[10vmin] -left-[10vmin] w-[32vmin] h-[32vmin] bg-blue-300/20 rounded-full blur-[8vmin] pointer-events-none"></div>

        <!-- Panel Wyszukiwania (Overlay na cały widget - zapobiega przysłanianiu przez wykres) -->
        <div id="search-panel" class="hidden absolute inset-0 bg-white/95 backdrop-blur-md z-30 p-[4vmin] rounded-[8vmin] flex flex-col transition-all duration-200">
            <div class="flex items-center gap-[2vmin] mb-[3vmin]">
                <div class="relative flex-1">
                    <input id="city-input" type="text" placeholder="Wpisz polskie lub zagraniczne miasto..." class="w-full bg-slate-100 text-slate-800 placeholder-slate-400 text-[3.5vmin] rounded-[3vmin] py-[2.5vmin] pl-[3vmin] pr-[8vmin] focus:outline-none focus:ring-[0.5vmin] focus:ring-orange-400 border border-slate-200">
                    <button id="clear-search-btn" class="absolute right-[2.5vmin] top-[3vmin] text-slate-400 hover:text-slate-600 hidden">
                        <i data-lucide="x" class="w-[4.5vmin] h-[4.5vmin]"></i>
                    </button>
                </div>
                <button id="close-search-btn" class="p-[2vmin] text-slate-500 hover:text-slate-800 text-[3.5vmin] font-semibold transition-colors">
                    Anuluj
                </button>
            </div>
            
            <div id="search-status" class="text-[3vmin] text-slate-500 px-[1vmin] py-[1vmin] hidden">Wyszukiwanie...</div>

            <!-- Wyniki wyszukiwania -->
            <div id="search-results" class="flex-1 overflow-y-auto custom-scrollbar space-y-[1vmin] pr-[1vmin]">
                <!-- Dynamiczne wyniki -->
            </div>
        </div>

        <!-- Nagłówek (Miasto i przycisk szukania) -->
        <div class="relative z-10">
            <div class="flex items-center justify-between mb-[2vmin]">
                <div class="flex flex-col">
                    <span id="widget-city" class="text-[5.2vmin] font-extrabold tracking-tight text-slate-800 truncate max-w-[45vmin]">Warszawa</span>
                    <span id="widget-country" class="text-[3.1vmin] font-medium text-slate-500 truncate max-w-[45vmin]">Polska</span>
                </div>
                
                <!-- Przycisk Lupy (Wyszukiwanie) -->
                <button id="search-toggle-btn" class="p-[2vmin] hover:bg-slate-200/50 active:scale-95 rounded-full transition-all text-slate-600 hover:text-slate-900" title="Zmień lokalizację">
                    <i data-lucide="search" class="w-[5vmin] h-[5vmin]"></i>
                </button>
            </div>
        </div>

        <!-- PIERWSZY WIERSZ: Ikona pogody i Temperatura -->
        <div id="weather-primary-row" class="relative z-10 flex items-center justify-between my-[1vmin] animate-fade-in">
            <div class="flex items-center gap-[3vmin]">
                <!-- Główna Ikona Pogodowa -->
                <div id="weather-icon-container" class="w-[14vmin] h-[14vmin] rounded-[4vmin] bg-white/80 shadow-sm flex items-center justify-center border border-slate-200/50">
                    <i data-lucide="sun" id="main-weather-icon" class="w-[8vmin] h-[8vmin] text-orange-500"></i>
                </div>
                <div class="flex flex-col">
                    <div class="flex items-baseline">
                        <span id="current-temp" class="text-[10vmin] font-black text-slate-800 tracking-tight">--</span>
                        <span class="text-[6vmin] font-bold text-orange-500 ml-[0.5vmin]">°C</span>
                    </div>
                    <span id="weather-description" class="text-[3.2vmin] text-slate-600 font-semibold capitalize">Wczytywanie...</span>
                </div>
            </div>

            <!-- Dodatkowe mini-info na pulpit -->
            <div class="text-right text-[2.8vmin] text-slate-500 space-y-[0.5vmin]">
                <div>Wiatr: <span id="wind-speed" class="text-slate-800 font-bold">-- km/h</span></div>
                <div id="rain-info">Opad: <span id="humidity" class="text-slate-800 font-bold">-- mm</span></div>
            </div>
        </div>

        <!-- PRZEŁĄCZNIK ZAKRESU (Dzisiaj / Jutro / Tydzień) -->
        <div class="relative z-10 flex bg-slate-200/50 p-[1vmin] rounded-[3vmin] my-[1.5vmin] text-[3vmin] font-bold text-slate-500 gap-[1vmin]">
            <button id="tab-today" class="flex-1 py-[1.5vmin] rounded-[2.2vmin] text-center bg-white text-slate-800 shadow-sm transition-all duration-200">Dzisiaj</button>
            <button id="tab-tomorrow" class="flex-1 py-[1.5vmin] rounded-[2.2vmin] text-center hover:text-slate-800 transition-all duration-200">Jutro</button>
            <button id="tab-week" class="flex-1 py-[1.5vmin] rounded-[2.2vmin] text-center hover:text-slate-800 transition-all duration-200">Tydzień</button>
        </div>

        <!-- DRUGI WIERSZ: Wykres (Temperatura + Opady) -->
        <div class="relative z-10 bg-white/40 rounded-[4vmin] p-[2vmin] border border-white/80 flex-1 flex flex-col justify-between min-h-[35vmin]">
            <div class="flex items-center justify-between text-[2.5vmin] text-slate-500 mb-[1vmin] px-[1vmin]">
                <span id="temp-legend-container" class="flex items-center gap-[2vmin] font-semibold">
                    <span class="flex items-center gap-[1vmin]"><span class="w-[2.5vmin] h-[2.5vmin] rounded-full bg-orange-500 inline-block"></span> Temp (°C)</span>
                </span>
                <span id="chart-view-label" class="text-center font-bold text-slate-400">Widok godzinowy</span>
                <span class="flex items-center gap-[1vmin] font-semibold"><span class="w-[2.5vmin] h-[2.5vmin] rounded-full bg-sky-500 inline-block"></span> Opady (mm)</span>
            </div>
            
            <!-- Kontener wykresu -->
            <div class="relative w-full h-[26vmin]">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <!-- Stopka synchronizacyjna -->
        <div class="relative z-10 mt-[1.5vmin] flex items-center justify-between text-[2.2vmin] text-slate-400 font-medium px-[1vmin]">
            <span id="sync-status">Chmura: Inicjalizacja...</span>
            <span id="update-time">Aktualizacja: --:--</span>
        </div>
    </div>

    <script>
        // --- KONFIGURACJA GLOBALA I FIREBASE ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'weather-widget-app';
        let db = null;
        let auth = null;
        let currentUser = null;

        // Domyślna lokalizacja (Warszawa, Polska)
        let currentLocation = {
            name: "Warszawa",
            country: "Polska",
            lat: 52.2298,
            lon: 21.0118
        };

        // Zapisany stan danych pogodowych (cache sieciowy)
        let weatherDataCached = null;
        let activeTab = 'today';

        // Inicjalizacja ikon Lucide
        lucide.createIcons();

        // Elementy DOM
        const widgetCity = document.getElementById('widget-city');
        const widgetCountry = document.getElementById('widget-country');
        const currentTemp = document.getElementById('current-temp');
        const weatherDescription = document.getElementById('weather-description');
        const windSpeed = document.getElementById('wind-speed');
        const humidity = document.getElementById('humidity');
        const updateTime = document.getElementById('update-time');
        const syncStatus = document.getElementById('sync-status');
        const mainWeatherIcon = document.getElementById('main-weather-icon');
        const weatherIconContainer = document.getElementById('weather-icon-container');
        const chartViewLabel = document.getElementById('chart-view-label');
        const tempLegendContainer = document.getElementById('temp-legend-container');

        // Elementy zakładek
        const tabToday = document.getElementById('tab-today');
        const tabTomorrow = document.getElementById('tab-tomorrow');
        const tabWeek = document.getElementById('tab-week');

        // Elementy wyszukiwania
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchPanel = document.getElementById('search-panel');
        const closeSearchBtn = document.getElementById('close-search-btn');
        const cityInput = document.getElementById('city-input');
        const clearSearchBtn = document.getElementById('clear-search-btn');
        const searchResults = document.getElementById('search-results');
        const searchStatus = document.getElementById('search-status');

        // Obiekt wykresu Chart.js
        let hourlyChart = null;

        // --- MAPOWANIE KODÓW POGODOWYCH WMO ---
        function getWmoDetails(code, isDay = 1) {
            const wmoMap = {
                0: { desc: "Słonecznie", icon: "sun", color: "text-orange-500", bg: "bg-orange-500/10" },
                1: { desc: "Głównie czysto", icon: "cloud-sun", color: "text-amber-500", bg: "bg-amber-500/10" },
                2: { desc: "Zachmurzenie umiarkowane", icon: "cloud-sun", color: "text-slate-500", bg: "bg-slate-500/10" },
                3: { desc: "Całkowite zachmurzenie", icon: "cloud", color: "text-slate-600", bg: "bg-slate-600/10" },
                45: { desc: "Mgła", icon: "cloud-fog", color: "text-zinc-500", bg: "bg-zinc-500/10" },
                48: { desc: "Szron i osadzająca się mgła", icon: "snowflake", color: "text-sky-400", bg: "bg-sky-500/10" },
                51: { desc: "Słaba mżawka", icon: "cloud-drizzle", color: "text-blue-400", bg: "bg-blue-500/10" },
                53: { desc: "Mżawka", icon: "cloud-drizzle", color: "text-blue-500", bg: "bg-blue-500/15" },
                55: { desc: "Gęsta mżawka", icon: "cloud-drizzle", color: "text-blue-600", bg: "bg-blue-500/20" },
                61: { desc: "Słaby deszcz", icon: "cloud-rain", color: "text-blue-500", bg: "bg-blue-500/15" },
                63: { desc: "Umiarkowany deszcz", icon: "cloud-rain", color: "text-blue-600", bg: "bg-blue-500/20" },
                65: { desc: "Ulewny deszcz", icon: "cloud-lightning", color: "text-blue-700", bg: "bg-blue-500/30" },
                71: { desc: "Słabe opady śniegu", icon: "snowflake", color: "text-teal-400", bg: "bg-teal-500/10" },
                73: { desc: "Opady śniegu", icon: "snowflake", color: "text-teal-500", bg: "bg-teal-500/15" },
                75: { desc: "Intensywny śnieg", icon: "snowflake", color: "text-slate-700", bg: "bg-teal-500/25" },
                80: { desc: "Przelotny deszcz", icon: "cloud-rain", color: "text-sky-500", bg: "bg-sky-500/15" },
                81: { desc: "Mocny przelotny deszcz", icon: "cloud-rain", color: "text-sky-600", bg: "bg-sky-500/25" },
                82: { desc: "Gwałtowna ulewa", icon: "cloud-lightning", color: "text-blue-700", bg: "bg-blue-600/30" },
                95: { desc: "Burza z piorunami", icon: "cloud-lightning", color: "text-yellow-600", bg: "bg-yellow-500/20" },
                96: { desc: "Burza z gradem", icon: "cloud-lightning", color: "text-yellow-700", bg: "bg-yellow-500/30" }
            };

            let details = wmoMap[code] || { desc: "Umiarkowana pogoda", icon: "cloud", color: "text-slate-500", bg: "bg-slate-500/10" };
            if (isDay === 0 && (code === 0 || code === 1 || code === 2)) {
                return {
                    ...details,
                    desc: code === 0 ? "Jasna noc" : "Głównie pogodna noc",
                    icon: "moon",
                    color: "text-indigo-600",
                    bg: "bg-indigo-500/10"
                };
            }
            return details;
        }

        // --- INICJALIZACJA FIREBASE ---
        async function setupFirebase() {
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    
                    db = firebase.firestore();
                    auth = firebase.auth();
                    
                    syncStatus.textContent = "Chmura: Łączenie...";

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }

                    auth.onAuthStateChanged(async (user) => {
                        if (user) {
                            currentUser = user;
                            syncStatus.textContent = "Chmura: Połączono";
                            await loadLocationFromCloud();
                        } else {
                            syncStatus.textContent = "Chmura: Zapis lokalny";
                            fetchWeatherData();
                        }
                    });
                } else {
                    throw new Error("Brak konfiguracji Firebase");
                }
            } catch (error) {
                console.warn("Błąd Firebase. Aplikacja działa w trybie offline/lokalnym.", error);
                syncStatus.textContent = "Chmura: Brak (Lokalnie)";
                fetchWeatherData();
            }
        }

        // --- WCZYTYWANIE LOKALIZACJI Z CHMURY ---
        async function loadLocationFromCloud() {
            if (!currentUser || !db) return;
            try {
                const docRef = db.doc(`artifacts/${appId}/users/${currentUser.uid}/preferences/location`);
                const docSnap = await docRef.get();
                
                if (docSnap.exists) {
                    const savedLoc = docSnap.data();
                    if (savedLoc && savedLoc.lat && savedLoc.lon) {
                        currentLocation = savedLoc;
                    }
                }
            } catch (err) {
                console.error("Błąd wczytywania lokalizacji z chmury:", err);
            } finally {
                fetchWeatherData();
            }
        }

        // --- ZAPIS LOKALIZACJI DO CHMURY ---
        async function saveLocationToCloud(loc) {
            currentLocation = loc;
            widgetCity.textContent = loc.name;
            widgetCountry.textContent = loc.country;

            if (currentUser && db) {
                try {
                    syncStatus.textContent = "Chmura: Zapisywanie...";
                    const docRef = db.doc(`artifacts/${appId}/users/${currentUser.uid}/preferences/location`);
                    await docRef.set({
                        name: loc.name,
                        country: loc.country,
                        lat: loc.lat,
                        lon: loc.lon,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    syncStatus.textContent = "Chmura: Zapisano";
                } catch (err) {
                    console.error("Błąd zapisu w chmurze:", err);
                    syncStatus.textContent = "Chmura: Błąd zapisu";
                }
            }
            
            fetchWeatherData();
        }

        // --- POBIERANIE DANYCH POGODOWYCH (Open-Meteo API z Max i Min Temp) ---
        async function fetchWeatherData() {
            widgetCity.textContent = currentLocation.name;
            widgetCountry.textContent = currentLocation.country;
            weatherDescription.textContent = "Aktualizacja...";

            // Pobieramy prognozę 7-dniową, w tym min i max temp, aby obsłużyć zaawansowany podgląd tygodnia
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLocation.lat}&longitude=${currentLocation.lon}&current_weather=true&hourly=temperature_2m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`;

            let retries = 5;
            let delay = 1000;

            while (retries > 0) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Błąd pobierania");
                    const data = await response.json();
                    
                    weatherDataCached = data; // Zapamiętanie danych w cache
                    updateWeatherUI(data);
                    return;
                } catch (error) {
                    retries--;
                    if (retries === 0) {
                        weatherDescription.textContent = "Brak połączenia";
                        console.error("Nie udało się połączyć z API Open-Meteo", error);
                    } else {
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
            }
        }

        // --- UPDATE INTERFEJSU POGODOWEGO ---
        function updateWeatherUI(data) {
            const current = data.current_weather;
            const hourly = data.hourly;

            currentTemp.textContent = Math.round(current.temperature);
            windSpeed.textContent = `${current.windspeed} km/h`;
            
            const currentHourStr = current.time.substring(0, 13) + ":00";
            const hourIndex = hourly.time.findIndex(t => t.startsWith(currentHourStr)) || 0;
            
            const currentPrecipitation = hourly.precipitation[hourIndex] || 0;
            humidity.textContent = `${currentPrecipitation} mm`;

            const wmo = getWmoDetails(current.weathercode, current.is_day);
            weatherDescription.textContent = wmo.desc;
            
            mainWeatherIcon.outerHTML = `<i data-lucide="${wmo.icon}" id="main-weather-icon" class="w-[8vmin] h-[8vmin] ${wmo.color} transition-all duration-300"></i>`;
            weatherIconContainer.className = `w-[14vmin] h-[14vmin] rounded-[4vmin] flex items-center justify-center border border-slate-200/60 shadow-sm transition-all duration-300 ${wmo.bg}`;
            
            lucide.createIcons();

            const now = new Date();
            updateTime.textContent = `Aktualizacja: ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            // Renderuj wykres na podstawie obecnie aktywnej zakładki
            renderActiveTabChart();
        }

        // --- PRZEKLUCZANIE WIDOKÓW (ZAKŁADKI) ---
        function switchTab(tabId) {
            activeTab = tabId;
            
            // Stylizacja przycisków
            const tabs = ['today', 'tomorrow', 'week'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabId) {
                    btn.className = "flex-1 py-[1.5vmin] rounded-[2.2vmin] text-center bg-white text-slate-800 shadow-sm transition-all duration-200";
                } else {
                    btn.className = "flex-1 py-[1.5vmin] rounded-[2.2vmin] text-center text-slate-500 hover:text-slate-800 transition-all duration-200";
                }
            });

            // Aktualizacja etykiet i legendy na nagłówku wykresu (teksty mają stały rozmiar vmin)
            if (tabId === 'today') {
                chartViewLabel.textContent = "Dzisiaj (godziny)";
                tempLegendContainer.innerHTML = `
                    <span class="flex items-center gap-[1vmin]"><span class="w-[2.5vmin] h-[2.5vmin] rounded-full bg-orange-500 inline-block"></span> Temp (°C)</span>
                `;
            } else if (tabId === 'tomorrow') {
                chartViewLabel.textContent = "Jutro (godziny)";
                tempLegendContainer.innerHTML = `
                    <span class="flex items-center gap-[1vmin]"><span class="w-[2.5vmin] h-[2.5vmin] rounded-full bg-orange-500 inline-block"></span> Temp (°C)</span>
                `;
            } else {
                chartViewLabel.textContent = "Najbliższy tydzień";
                tempLegendContainer.innerHTML = `
                    <span class="flex items-center gap-[1vmin]"><span class="w-[2vmin] h-[2vmin] rounded bg-orange-500 inline-block"></span> Max</span>
                    <span class="flex items-center gap-[1vmin]"><span class="w-[2vmin] h-[2vmin] rounded bg-blue-600 inline-block"></span> Min</span>
                `;
            }

            renderActiveTabChart();
        }

        tabToday.addEventListener('click', () => switchTab('today'));
        tabTomorrow.addEventListener('click', () => switchTab('tomorrow'));
        tabWeek.addEventListener('click', () => switchTab('week'));

        // Pomocnicza funkcja formatowania nazw dni po polsku
        function getPolishDayName(dateStr) {
            const dateObj = new Date(dateStr);
            const days = ['Ndz', 'Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob'];
            return days[dateObj.getDay()];
        }

        // --- AUTORSKI PLUGIN DO CHART.JS: PRZYCIEMNIANIE PRZESZŁOŚCI DLA "DZISIAJ" ---
        const pastHoursDimmerPlugin = {
            id: 'pastHoursDimmer',
            beforeDraw: (chart) => {
                if (activeTab !== 'today') return;
                const { ctx, chartArea: { top, bottom, left }, scales: { x } } = chart;
                const now = new Date();
                
                // Znajdujemy płynną pozycję piksela dla aktualnego czasu
                const continuousVal = (now.getHours() + now.getMinutes() / 60) / 2;
                const clampedVal = Math.max(0, Math.min(11, continuousVal));
                const xPos = x.getPixelForValue(clampedVal);

                ctx.save();
                
                // Rysujemy półprzezroczysty szary prostokąt nad przeszłością
                ctx.fillStyle = 'rgba(15, 23, 42, 0.05)';
                ctx.fillRect(left, top, xPos - left, bottom - top);
                
                // Rysujemy pionową przerywaną linię oznaczającą "Teraz"
                ctx.strokeStyle = 'rgba(249, 115, 22, 0.35)';
                ctx.lineWidth = window.innerWidth * 0.003; // Dynamiczna szerokość linii
                ctx.setLineDash([4, 3]);
                ctx.beginPath();
                ctx.moveTo(xPos, top);
                ctx.lineTo(xPos, bottom);
                ctx.stroke();
                
                ctx.restore();
            }
        };

        // --- RENDERING WYKRESU W ZALEŻNOŚCI OD ZAKŁADKI ---
        function renderActiveTabChart() {
            if (!weatherDataCached) return;

            const canvasElement = document.getElementById('hourlyChart');
            if (!canvasElement) return;
            const ctx = canvasElement.getContext('2d');

            const now = new Date();
            const currentHour = now.getHours();

            let labels = [];
            let datasets = [];
            let finalMinTemp = 0;
            let finalMaxTemp = 40;
            let finalMaxRain = 2;

            // Obliczenie dynamicznego rozmiaru czcionki dla wykresu na podstawie vmin okna
            const dynamicFontSize = Math.max(7, window.innerWidth * 0.022);

            if (activeTab === 'today') {
                // DZISIAJ: Pierwsze 24 godziny (co 2 godziny dla przejrzystości)
                const hourly = weatherDataCached.hourly;
                const tempData = [];
                const rainData = [];

                for (let i = 0; i < 24; i += 2) {
                    const hour = hourly.time[i].split('T')[1].substring(0, 5);
                    labels.push(hour);
                    tempData.push(hourly.temperature_2m[i]);
                    rainData.push(hourly.precipitation[i]);
                }

                // Autokalibracja osi temperatur
                const minTemp = Math.min(...tempData);
                const maxTemp = Math.max(...tempData);
                finalMinTemp = Math.floor(minTemp - 1.5);
                finalMaxTemp = Math.ceil(maxTemp + 1.5);

                const maxRain = Math.max(...rainData);
                finalMaxRain = maxRain > 0 ? Math.ceil(maxRain * 1.2) : 2.0;

                datasets = [
                    {
                        label: 'Opady (mm)',
                        data: rainData,
                        type: 'bar',
                        backgroundColor: ctx => {
                            const idx = ctx.dataIndex;
                            const labelHour = idx * 2;
                            return labelHour < currentHour ? 'rgba(14, 165, 233, 0.18)' : 'rgba(14, 165, 233, 0.65)';
                        },
                        borderColor: ctx => {
                            const idx = ctx.dataIndex;
                            const labelHour = idx * 2;
                            return labelHour < currentHour ? 'rgba(14, 165, 233, 0.25)' : 'rgb(14, 165, 233)';
                        },
                        borderWidth: 1,
                        borderRadius: 3,
                        yAxisID: 'yRain',
                        barPercentage: 0.65
                    },
                    {
                        label: 'Temp (°C)',
                        data: tempData,
                        type: 'line',
                        borderColor: 'rgb(249, 115, 22)',
                        segment: {
                            borderColor: ctx => {
                                if (ctx.p1DataIndex === undefined) return 'rgb(249, 115, 22)';
                                const labelHour = ctx.p1DataIndex * 2;
                                return labelHour <= currentHour ? 'rgba(249, 115, 22, 0.25)' : 'rgb(249, 115, 22)';
                            }
                        },
                        backgroundColor: 'rgba(249, 115, 22, 0.08)',
                        borderWidth: 2.5,
                        tension: 0.35,
                        pointBackgroundColor: ctx => {
                            const idx = ctx.dataIndex;
                            const labelHour = idx * 2;
                            return labelHour <= currentHour ? 'rgba(249, 115, 22, 0.3)' : 'rgb(249, 115, 22)';
                        },
                        pointBorderColor: ctx => {
                            const idx = ctx.dataIndex;
                            const labelHour = idx * 2;
                            return labelHour <= currentHour ? 'rgba(249, 115, 22, 0.3)' : 'rgb(249, 115, 22)';
                        },
                        pointRadius: 2.5,
                        pointHoverRadius: 4,
                        yAxisID: 'yTemp',
                        fill: true
                    }
                ];

            } else if (activeTab === 'tomorrow') {
                // JUTRO: Godziny od 24 do 48 (co 2 godziny)
                const hourly = weatherDataCached.hourly;
                const tempData = [];
                const rainData = [];

                for (let i = 24; i < 48; i += 2) {
                    const hour = hourly.time[i].split('T')[1].substring(0, 5);
                    labels.push(hour);
                    tempData.push(hourly.temperature_2m[i]);
                    rainData.push(hourly.precipitation[i]);
                }

                const minTemp = Math.min(...tempData);
                const maxTemp = Math.max(...tempData);
                finalMinTemp = Math.floor(minTemp - 1.5);
                finalMaxTemp = Math.ceil(maxTemp + 1.5);

                const maxRain = Math.max(...rainData);
                finalMaxRain = maxRain > 0 ? Math.ceil(maxRain * 1.2) : 2.0;

                datasets = [
                    {
                        label: 'Opady (mm)',
                        data: rainData,
                        type: 'bar',
                        backgroundColor: 'rgba(14, 165, 233, 0.65)',
                        borderColor: 'rgb(14, 165, 233)',
                        borderWidth: 1.5,
                        borderRadius: 3,
                        yAxisID: 'yRain',
                        barPercentage: 0.65
                    },
                    {
                        label: 'Temp (°C)',
                        data: tempData,
                        type: 'line',
                        borderColor: 'rgb(249, 115, 22)',
                        backgroundColor: 'rgba(249, 115, 22, 0.08)',
                        borderWidth: 2.5,
                        tension: 0.35,
                        pointRadius: 2.5,
                        pointHoverRadius: 4,
                        yAxisID: 'yTemp',
                        fill: true
                    }
                ];

            } else if (activeTab === 'week') {
                // TYDZIEŃ: 7 dni z podwójną linią temperatury (Max i Min)
                const daily = weatherDataCached.daily;
                const tempMaxData = [];
                const tempMinData = [];
                const rainData = [];

                for (let i = 0; i < daily.time.length; i++) {
                    const dayLabel = getPolishDayName(daily.time[i]);
                    labels.push(dayLabel);
                    tempMaxData.push(daily.temperature_2m_max[i]);
                    tempMinData.push(daily.temperature_2m_min[i]);
                    rainData.push(daily.precipitation_sum[i]);
                }

                const allTemps = [...tempMaxData, ...tempMinData];
                const minTemp = Math.min(...allTemps);
                const maxTemp = Math.max(...allTemps);
                finalMinTemp = Math.floor(minTemp - 1.5);
                finalMaxTemp = Math.ceil(maxTemp + 1.5);

                const maxRain = Math.max(...rainData);
                finalMaxRain = maxRain > 0 ? Math.ceil(maxRain * 1.2) : 2.0;

                datasets = [
                    {
                        label: 'Suma opadów (mm)',
                        data: rainData,
                        type: 'bar',
                        backgroundColor: 'rgba(14, 165, 233, 0.45)',
                        borderColor: 'rgb(14, 165, 233)',
                        borderWidth: 1,
                        borderRadius: 3,
                        yAxisID: 'yRain',
                        barPercentage: 0.65
                    },
                    {
                        label: 'Temp Max (°C)',
                        data: tempMaxData,
                        type: 'line',
                        borderColor: 'rgb(249, 115, 22)',
                        backgroundColor: 'transparent',
                        borderWidth: 2.5,
                        tension: 0.35,
                        pointRadius: 2.5,
                        pointHoverRadius: 4,
                        yAxisID: 'yTemp'
                    },
                    {
                        label: 'Temp Min (°C)',
                        data: tempMinData,
                        type: 'line',
                        borderColor: 'rgb(37, 99, 235)',
                        backgroundColor: 'transparent',
                        borderWidth: 2.5,
                        tension: 0.35,
                        pointRadius: 2.5,
                        pointHoverRadius: 4,
                        yAxisID: 'yTemp'
                    }
                ];
            }

            // Bezpieczne usuwanie starego wykresu przed nowym renderem
            if (hourlyChart) {
                hourlyChart.destroy();
                hourlyChart = null;
            }

            // Inicjalizacja wykresu o nieskazitelnej ostrości
            hourlyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                plugins: [pastHoursDimmerPlugin],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    devicePixelRatio: window.devicePixelRatio || 1, // Wymuszenie fizycznej rozdzielczości ekranu
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#1e293b',
                            bodyColor: '#334155',
                            borderColor: '#e2e8f0',
                            borderWidth: 1,
                            padding: 8,
                            cornerRadius: 12,
                            titleFont: { size: dynamicFontSize * 1.1, weight: 'bold' },
                            bodyFont: { size: dynamicFontSize },
                            shadowColor: 'rgba(0,0,0,0.05)',
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        const isRain = context.datasetIndex === 0;
                                        label += context.parsed.y + (isRain ? ' mm' : '°C');
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#64748b',
                                font: {
                                    size: dynamicFontSize,
                                    weight: '600'
                                },
                                maxRotation: 0
                            }
                        },
                        yTemp: {
                            type: 'linear',
                            position: 'left',
                            min: finalMinTemp,
                            max: finalMaxTemp,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.04)'
                            },
                            ticks: {
                                color: 'rgb(249, 115, 22)',
                                font: {
                                    size: dynamicFontSize,
                                    weight: '700'
                                },
                                callback: function(value) {
                                    return value + '°';
                                }
                            }
                        },
                        yRain: {
                            type: 'linear',
                            position: 'right',
                            grid: {
                                display: false
                            },
                            min: 0,
                            max: finalMaxRain,
                            ticks: {
                                color: 'rgb(14, 165, 233)',
                                font: {
                                    size: dynamicFontSize,
                                    weight: '700'
                                },
                                callback: function(value) {
                                    return value > 0 ? value + ' mm' : '0';
                                }
                            }
                        }
                    }
                }
            });
        }

        // --- PANEL WYSZUKIWANIA ---
        let searchTimeout = null;

        searchToggleBtn.addEventListener('click', () => {
            searchPanel.classList.remove('hidden');
            cityInput.focus();
        });

        closeSearchBtn.addEventListener('click', () => {
            searchPanel.classList.add('hidden');
            cityInput.value = '';
            searchResults.innerHTML = '';
            clearSearchBtn.classList.add('hidden');
            searchStatus.classList.add('hidden');
        });

        cityInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length > 0) {
                clearSearchBtn.classList.remove('hidden');
            } else {
                clearSearchBtn.classList.add('hidden');
                searchResults.innerHTML = '';
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchCities(query);
            }, 350);
        });

        clearSearchBtn.addEventListener('click', () => {
            cityInput.value = '';
            searchResults.innerHTML = '';
            clearSearchBtn.classList.add('hidden');
            searchStatus.classList.add('hidden');
            cityInput.focus();
        });

        // Wyszukiwanie miast w Open-Meteo Geocoding
        async function searchCities(query) {
            searchStatus.textContent = "Wyszukiwanie...";
            searchStatus.classList.remove('hidden');

            try {
                const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=pl&format=json`);
                if (!response.ok) throw new Error("Błąd geokodowania");
                const data = await response.json();

                searchResults.innerHTML = '';

                if (!data.results || data.results.length === 0) {
                    searchStatus.textContent = "Nie znaleziono miejscowości o tej nazwie.";
                    return;
                }

                searchStatus.classList.add('hidden');

                data.results.forEach(city => {
                    const country = city.country || "";
                    const admin1 = city.admin1 ? `${city.admin1}` : "";
                    const fullRegion = admin1 ? `${admin1}, ${country}` : country;
                    
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-[2.5vmin] hover:bg-slate-100 rounded-[3vmin] transition-all flex items-center justify-between border border-transparent hover:border-slate-200/80 group";
                    btn.innerHTML = `
                        <div class="flex flex-col truncate pr-[2vmin]">
                            <span class="text-[3.5vmin] font-bold text-slate-800 group-hover:text-orange-500 transition-colors">${city.name}</span>
                            <span class="text-[2.5vmin] text-slate-500 font-semibold truncate">${fullRegion}</span>
                        </div>
                        <i data-lucide="chevron-right" class="w-[4vmin] h-[4vmin] text-slate-400 group-hover:text-slate-800 transition-all transform group-hover:translate-x-[0.5vmin]"></i>
                    `;

                    btn.addEventListener('click', () => {
                        saveLocationToCloud({
                            name: city.name,
                            country: fullRegion,
                            lat: city.latitude,
                            lon: city.longitude
                        });
                        
                        activeTab = 'today';
                        switchTab('today');
                        
                        closeSearchBtn.click();
                    });

                    searchResults.appendChild(btn);
                });

                lucide.createIcons();

            } catch (err) {
                console.error("Problem przy wyszukiwaniu:", err);
                searchStatus.textContent = "Wystąpił błąd przy pobieraniu listy miast.";
            }
        }

        // Automatyczne odświeżenie wykresu przy zmianie rozmiaru okna w celu zachowania krystalicznej ostrości
        let resizeTimeout = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                renderActiveTabChart();
            }, 100);
        });

        // Start aplikacji przy załadowaniu okna
        window.onload = function() {
            setupFirebase();
        };
    </script>
</body>
</html>
